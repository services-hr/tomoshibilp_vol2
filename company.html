<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --orange-main: #F28A2E;
  --orange-dark: #E07020;
  --orange-bg: #FEF3E8;
  --yellow-cta: #FFE84C;
  --green-line: #06C755;
  --white: #FFFFFF;
  --text-dark: #2D2D2D;
  --text-body: #4A4A4A;
  --gray-light: #F7F7F7;
  --border-warm: #EFE7DC;
}

html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--text-dark);
  line-height: 1.8;
  background: var(--gray-light);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
img { max-width:100%; height:auto; display:block; }
a { color: inherit; }
a:focus-visible, button:focus-visible {
  outline: 3px solid var(--orange-dark); outline-offset: 2px; border-radius: 4px;
}

/* HEADER (LP共通) */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 1px 8px rgba(0,0,0,0.06);
}
.logo-img { height: 40px; width: auto; }
.line-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--green-line); color: var(--white);
  padding: 10px 18px; border-radius: 30px;
  text-decoration: none; font-weight: 700; font-size: 13px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 2px 10px rgba(6,199,85,0.3); white-space: nowrap;
}
.line-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(6,199,85,0.4); }
.line-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

/* SUBPAGE HERO */
.subpage-hero {
  position: relative;
  background: linear-gradient(135deg, var(--orange-main) 0%, #F5A623 50%, var(--orange-dark) 100%);
  color: var(--white); text-align: center;
  padding: 48px 20px 52px; overflow: hidden;
}
.subpage-hero-eyebrow {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: clamp(40px, 15vw, 92px); font-weight: 900; letter-spacing: 4px;
  line-height: 1; color: rgba(255,255,255,0.13);
  white-space: nowrap; pointer-events: none; user-select: none;
}
.subpage-hero-title {
  position: relative; font-size: clamp(24px, 6vw, 38px);
  font-weight: 900; line-height: 1.4;
}

/* MAIN */
.subpage-main { max-width: 860px; margin: 0 auto; padding: 28px 20px 72px; }
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--orange-dark); font-weight: 700; font-size: 14px;
  text-decoration: none; margin-bottom: 18px; transition: opacity 0.2s;
}
.back-link:hover { opacity: 0.7; text-decoration: underline; }
.back-link-bottom { margin: 28px 0 0; }
.content-card {
  background: var(--white); border-radius: 16px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.06); padding: 28px 22px;
}

/* INFO TABLE */
.info-table { border: 1px solid var(--border-warm); border-radius: 12px; overflow: hidden; }
.info-row { display: flex; flex-direction: column; }
.info-row + .info-row { border-top: 1px solid var(--border-warm); }
.info-row dt {
  font-weight: 700; color: var(--orange-dark); font-size: 13px;
  background: var(--orange-bg); padding: 12px 18px 6px;
}
.info-row dd {
  color: var(--text-body); font-size: 15px;
  padding: 6px 18px 14px; word-break: break-word;
}
.info-row dd a { color: var(--orange-main); text-decoration: none; font-weight: 700; }
.info-row dd a:hover { text-decoration: underline; }

/* FOOTER (LP共通) */
.footer {
  background: var(--orange-bg); padding: 24px 20px; text-align: center;
  display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
  border-top: 1px solid rgba(0,0,0,0.06);
}
.footer a { color: var(--text-body); text-decoration: none; font-size: 13px; }
.footer a:hover { text-decoration: underline; }
.footer a[aria-current="page"] { color: var(--orange-main); font-weight: 700; }

@media (min-width: 600px) {
  .info-row { flex-direction: row; }
  .info-row dt {
    flex-shrink: 0; width: 220px; font-size: 14px;
    padding: 18px 20px; display: flex; align-items: center;
  }
  .info-row dd {
    flex: 1; padding: 18px 22px; display: flex; align-items: center;
    border-left: 1px solid var(--border-warm);
  }
}
@media (min-width: 768px) {
  .header { padding: 14px 32px; }
  .logo-img { height: 48px; }
  .line-btn { padding: 12px 24px; font-size: 15px; }
  .subpage-hero { padding: 64px 32px 68px; }
  .content-card { padding: 44px 48px; }
}
@media (min-width: 1024px) {
  .header { padding: 16px 60px; }
  .logo-img { height: 52px; }
}
</style>
</head>
